<svg width="1200" height="820" viewBox="0 0 1200 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">all_image_compress benchmark results</title>
  <desc id="desc">Color benchmark chart comparing file-size reduction and sync versus async compression times.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10231f"/>
      <stop offset="0.48" stop-color="#172538"/>
      <stop offset="1" stop-color="#261a31"/>
    </linearGradient>
    <linearGradient id="jpeg" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#26D07C"/>
      <stop offset="1" stop-color="#8FE388"/>
    </linearGradient>
    <linearGradient id="png" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#4D96FF"/>
      <stop offset="1" stop-color="#8C6CFF"/>
    </linearGradient>
    <linearGradient id="sync" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#FFB84D"/>
      <stop offset="1" stop-color="#FF7A59"/>
    </linearGradient>
    <linearGradient id="async" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#5DE1E6"/>
      <stop offset="1" stop-color="#4D96FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1200" height="820" rx="34" fill="url(#bg)"/>
  <circle cx="1048" cy="100" r="130" fill="#26D07C" opacity="0.08"/>
  <circle cx="112" cy="540" r="160" fill="#4D96FF" opacity="0.08"/>

  <text x="70" y="70" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">Benchmark examples</text>
  <text x="70" y="105" fill="#B8C7D9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">Synthetic large-image runs from benchmark/image_benchmark.dart</text>

  <g filter="url(#shadow)">
    <rect x="60" y="145" width="520" height="400" rx="22" fill="#FFFFFF" opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.16"/>
    <text x="95" y="195" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">File-size reduction</text>
    <text x="95" y="224" fill="#B8C7D9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Original bytes vs compressed output</text>

    <text x="95" y="280" fill="#DDE7F3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">JPEG photo</text>
    <rect x="95" y="302" width="390" height="28" rx="14" fill="#FFFFFF" opacity="0.13"/>
    <rect x="95" y="302" width="390" height="28" rx="14" fill="url(#jpeg)" opacity="0.85"/>
    <text x="498" y="322" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">5.80MB</text>
    <rect x="95" y="342" width="87" height="28" rx="14" fill="url(#jpeg)"/>
    <text x="196" y="362" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">1.30MB</text>
    <text x="95" y="395" fill="#8FE388" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="42" font-weight="900">77.6%</text>
    <text x="246" y="395" fill="#B8C7D9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">smaller</text>

    <text x="95" y="450" fill="#DDE7F3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">PNG with alpha</text>
    <rect x="95" y="472" width="220" height="28" rx="14" fill="#FFFFFF" opacity="0.13"/>
    <rect x="95" y="472" width="220" height="28" rx="14" fill="url(#png)" opacity="0.85"/>
    <text x="328" y="492" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">29.5KB</text>
    <rect x="95" y="512" width="105" height="28" rx="14" fill="url(#png)"/>
    <text x="214" y="532" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">14.1KB</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="620" y="145" width="520" height="400" rx="22" fill="#FFFFFF" opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.16"/>
    <text x="655" y="195" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Execution time</text>
    <text x="655" y="224" fill="#B8C7D9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Sync pipeline vs isolate-backed async pipeline</text>

    <text x="655" y="280" fill="#DDE7F3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">JPEG photo 4000x3000 to 1920</text>
    <rect x="655" y="302" width="360" height="28" rx="14" fill="url(#sync)"/>
    <text x="1030" y="322" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">1082ms sync</text>
    <rect x="655" y="342" width="380" height="28" rx="14" fill="url(#async)"/>
    <text x="1050" y="362" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">1143ms async</text>

    <text x="655" y="425" fill="#DDE7F3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">PNG alpha 2500x2500 to 1000</text>
    <rect x="655" y="447" width="151" height="28" rx="14" fill="url(#sync)"/>
    <text x="820" y="467" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">454ms sync</text>
    <rect x="655" y="487" width="136" height="28" rx="14" fill="url(#async)"/>
    <text x="805" y="507" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">407ms async</text>
  </g>

  <g>
    <rect x="60" y="580" width="1080" height="165" rx="22" fill="#FFFFFF" opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.16"/>
    <text x="95" y="630" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Large phone photos</text>
    <text x="95" y="659" fill="#B8C7D9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">50MB+ synthetic iPhone/Samsung-style JPEG fixtures resized to 1920px</text>

    <text x="95" y="710" fill="#DDE7F3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">iPhone 48MP</text>
    <rect x="215" y="691" width="300" height="26" rx="13" fill="url(#jpeg)" opacity="0.85"/>
    <text x="530" y="710" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">51.76MB -> 3.24MB</text>
    <text x="700" y="710" fill="#8FE388" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800">93.7% smaller</text>
    <text x="840" y="710" fill="#FFB84D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">5064ms sync</text>
    <text x="965" y="710" fill="#5DE1E6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">5531ms async</text>

    <text x="95" y="738" fill="#DDE7F3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Samsung 50MP</text>
    <rect x="215" y="719" width="350" height="26" rx="13" fill="url(#png)" opacity="0.85"/>
    <text x="580" y="738" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">60.92MB -> 3.26MB</text>
    <text x="750" y="738" fill="#8FE388" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800">94.7% smaller</text>
    <text x="890" y="738" fill="#FFB84D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">5733ms sync</text>
    <text x="1015" y="738" fill="#5DE1E6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">5934ms async</text>
  </g>

  <g>
    <rect x="70" y="780" width="14" height="14" rx="7" fill="url(#jpeg)"/>
    <text x="94" y="793" fill="#B8C7D9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">JPEG size</text>
    <rect x="190" y="780" width="14" height="14" rx="7" fill="url(#png)"/>
    <text x="214" y="793" fill="#B8C7D9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">PNG/phone size</text>
    <rect x="340" y="780" width="14" height="14" rx="7" fill="url(#sync)"/>
    <text x="364" y="793" fill="#B8C7D9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">sync</text>
    <rect x="425" y="780" width="14" height="14" rx="7" fill="url(#async)"/>
    <text x="449" y="793" fill="#B8C7D9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">async</text>
  </g>
</svg>

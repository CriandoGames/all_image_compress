<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>all_image_compress — banner</title>
  <desc>Banner da biblioteca all_image_compress para Flutter, compressão de imagens 100% Dart</desc>

  <!-- Background dark -->
  <rect width="1200" height="300" fill="#0D1117"/>

  <!-- Subtle grid lines -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161B22" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="300" fill="url(#grid)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="300" fill="#54C5F8"/>

  <!-- Flutter logo (simplified diamond) -->
  <g transform="translate(60, 80)">
    <polygon points="30,0 60,30 30,60 0,30" fill="#54C5F8" opacity="0.15"/>
    <polygon points="30,0 60,30 30,60 0,30" fill="none" stroke="#54C5F8" stroke-width="1.5"/>
    <line x1="0" y1="30" x2="60" y2="30" stroke="#54C5F8" stroke-width="1" opacity="0.5"/>
    <line x1="30" y1="0" x2="30" y2="60" stroke="#54C5F8" stroke-width="1" opacity="0.5"/>
    <circle cx="30" cy="30" r="4" fill="#54C5F8"/>
  </g>

  <!-- Package name -->
  <text x="145" y="115" font-family="'Courier New', monospace" font-size="13" fill="#54C5F8" letter-spacing="2">dart package</text>
  <text x="140" y="165" font-family="'Courier New', monospace" font-size="44" font-weight="bold" fill="#FFFFFF" letter-spacing="-1">all_image_compress</text>

  <!-- Tagline -->
  <text x="142" y="200" font-family="'Courier New', monospace" font-size="16" fill="#8B949E" letter-spacing="1">100% Pure Dart · Isolate-powered · All platforms</text>

  <!-- Format badges -->
  <rect x="142" y="220" width="60" height="22" rx="4" fill="#1F6FEB" opacity="0.8"/>
  <text x="172" y="235" font-family="'Courier New', monospace" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold">JPEG</text>

  <rect x="210" y="220" width="60" height="22" rx="4" fill="#1F6FEB" opacity="0.8"/>
  <text x="240" y="235" font-family="'Courier New', monospace" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold">PNG</text>

  <rect x="278" y="220" width="60" height="22" rx="4" fill="#1F6FEB" opacity="0.8"/>
  <text x="308" y="235" font-family="'Courier New', monospace" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold">GIF</text>

  <rect x="346" y="220" width="60" height="22" rx="4" fill="#1F6FEB" opacity="0.8"/>
  <text x="376" y="235" font-family="'Courier New', monospace" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold">BMP</text>

  <rect x="414" y="220" width="60" height="22" rx="4" fill="#1F6FEB" opacity="0.8"/>
  <text x="444" y="235" font-family="'Courier New', monospace" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold">TIFF</text>

  <rect x="482" y="220" width="76" height="22" rx="4" fill="#21262D" opacity="0.9"/>
  <text x="520" y="235" font-family="'Courier New', monospace" font-size="11" fill="#8B949E" text-anchor="middle" font-weight="bold">WebP ↓</text>

  <!-- Right side: compression visual -->
  <g transform="translate(720, 40)">

    <!-- Input file -->
    <rect x="0" y="30" width="90" height="110" rx="6" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
    <rect x="8" y="50" width="74" height="52" rx="3" fill="#0D1117"/>
    <circle cx="26" cy="66" r="8" fill="#1F6FEB" opacity="0.7"/>
    <polygon points="12,90 35,68 50,82 62,72 82,90" fill="#21262D"/>
    <polygon points="12,90 35,68 50,82 62,72 82,90" fill="#238636" opacity="0.5"/>
    <text x="45" y="120" font-family="'Courier New', monospace" font-size="10" fill="#8B949E" text-anchor="middle">original</text>
    <text x="45" y="132" font-family="'Courier New', monospace" font-size="10" fill="#E6EDF3" text-anchor="middle">3.2 MB</text>

    <!-- Isolate gear -->
    <g transform="translate(100, 70)">
      <circle cx="25" cy="25" r="20" fill="#161B22" stroke="#54C5F8" stroke-width="1.5"/>
      <g transform="translate(25,25)">
        <rect x="-3" y="-20" width="6" height="8" rx="2" fill="#54C5F8"/>
        <rect x="-3" y="12" width="6" height="8" rx="2" fill="#54C5F8"/>
        <rect x="12" y="-3" width="8" height="6" rx="2" fill="#54C5F8"/>
        <rect x="-20" y="-3" width="8" height="6" rx="2" fill="#54C5F8"/>
        <circle cx="0" cy="0" r="8" fill="#0D1117" stroke="#54C5F8" stroke-width="1.5"/>
        <circle cx="0" cy="0" r="3" fill="#54C5F8"/>
      </g>
      <text x="25" y="58" font-family="'Courier New', monospace" font-size="9" fill="#54C5F8" text-anchor="middle">Isolate</text>
    </g>

    <!-- Dashed arrows -->
    <line x1="90" y1="85" x2="105" y2="85" stroke="#54C5F8" stroke-width="1.5" stroke-dasharray="3,2"/>
    <line x1="147" y1="85" x2="162" y2="85" stroke="#54C5F8" stroke-width="1.5" stroke-dasharray="3,2"/>
    <polygon points="160,81 168,85 160,89" fill="#54C5F8"/>

    <!-- Output file (smaller) -->
    <rect x="168" y="30" width="68" height="82" rx="6" fill="#161B22" stroke="#238636" stroke-width="1.5"/>
    <rect x="174" y="48" width="56" height="38" rx="3" fill="#0D1117"/>
    <circle cx="185" cy="58" r="5" fill="#1F6FEB" opacity="0.7"/>
    <polygon points="174,80 190,62 200,72 210,66 230,80" fill="#21262D"/>
    <polygon points="174,80 190,62 200,72 210,66 230,80" fill="#238636" opacity="0.5"/>
    <text x="202" y="100" font-family="'Courier New', monospace" font-size="10" fill="#8B949E" text-anchor="middle">output</text>
    <text x="202" y="112" font-family="'Courier New', monospace" font-size="10" fill="#3FB950" text-anchor="middle">410 KB</text>

    <!-- Compression stat pill -->
    <rect x="90" y="130" width="150" height="28" rx="5" fill="#0D2119"/>
    <text x="165" y="149" font-family="'Courier New', monospace" font-size="13" fill="#3FB950" text-anchor="middle" font-weight="bold">-87.5% smaller</text>

    <!-- Platform list -->
    <text x="0" y="185" font-family="'Courier New', monospace" font-size="10" fill="#8B949E">Android · iOS · Web · macOS · Windows · Linux</text>
  </g>

  <!-- Bottom line -->
  <line x1="0" y1="296" x2="1200" y2="296" stroke="#21262D" stroke-width="1"/>
  <text x="600" y="285" font-family="'Courier New', monospace" font-size="10" fill="#30363D" text-anchor="middle" letter-spacing="3">github.com / all_image_compress</text>
</svg>
